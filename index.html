<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <title>Generate a caps</title>

    <style>
        .vstack {
            display: flex;
            flex-direction: column;
            align-items: center;
            row-gap: 30px;
            margin: 5% 15%;
            padding: 20px;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }

        canvas {
            border: 1px solid #ccc;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            color: tomato;
        }

        label {
            font-size: 18px;
            color: cadetblue;
            align-self: flex-start;
        }

        .file-input {
            padding: 10px;
            font-size: 20px;
            color: cadetblue;
        }

        .text-input {
            padding: 10px;
            font-size: 20px;
            color: cadetblue;
            width: 400px;
        }
    </style>

    <script>
        // Download modified image
        function downloadImage() {
            const canvas = document.getElementById('canvas');
            const link = document.createElement('a');
            link.download = 'modified_image.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        window.onload = function () {

            document.getElementById('imageInput').addEventListener('change', function (event) {

                const textOnImage = document.getElementById('textInput').value || '';

                if (textOnImage == '') {
                    alert('No text entered. Please first add a text');
                    return;
                }

                if(textOnImage.length > 50) {
                    alert('Text is too long. Please enter a text with less than 50 characters');
                    return;
                }

                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const img = new Image();
                        img.onload = function () {
                            const canvas = document.getElementById('canvas');
                            const ctx = canvas.getContext('2d');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            const charLength = textOnImage.length;
                            const textFont = Math.round((img.width) / charLength + 4.5); // Add some padding
                            ctx.font = `${textFont}px Arial`;
                            ctx.fillStyle = 'red';

                            // Fİll the background with white color to make the text visible if the image has a dark background
                            const rectangleHeight = img.height / 8; // Add some padding
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; // Semi-transparent white
                            ctx.fillRect(0, img.height - rectangleHeight, img.width, rectangleHeight);

                            // Fill the text in the middle of rectangle
                            ctx.fillStyle = 'red';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(textOnImage, img.width / 2, img.height - rectangleHeight / 2);
                        }
                        img.src = e.target.result;
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

    </script>
</head>

<body>
    <h1> Text on an image to generate a <i>caps</i></h1>
    <div class="vstack">
        <label for="textInput"> 1. ↓ Enter a text to add on the image</label>
        <input type="text" id="textInput" placeholder="Enter text to add on image" class="text-input"
            title="Enter the text you want to add on the image">

        <label for="imageInput"> 2. ↓ Choose an image to upload and add text on it</label>
        <input type="file" id="imageInput" accept="image/*" class="file-input" placeholder="Choose an image"
            title="Choose an image to upload and add text on it">

        <label for="downloadImage"> 3. ↓ Download the image after rendering</label>
        <button id="downloadImage" onclick="downloadImage()">Download Image</button>

        <canvas id="canvas"></canvas>
    </div>

</html>
